<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posilovna – Údržba systému</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #334155;
      max-width: 460px;
      width: 90%;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #f8fafc;
    }
    p {
      color: #94a3b8;
      line-height: 1.7;
      font-size: 1rem;
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      margin: 24px 4px 0;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🏋️</span>
    <h1>Probíhá údržba systému</h1>
    <p>
      Rezervační systém posilovny je dočasně nedostupný z důvodu plánované údržby.<br /><br />
      Budeme zpět za chvilku.
    </p>
    <div>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</body>
</html>
